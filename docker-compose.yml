services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: ["chroma:/app/data/chroma"]
    restart: unless-stopped
  dashboard:
    build: .
    command: streamlit run finagent/ui/app.py --server.address=0.0.0.0 --server.port=8501
    environment: ["FINAGENT_API_URL=http://api:8000/api/v1"]
    ports: ["8501:8501"]
    depends_on: [api]
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment: ["POSTGRES_DB=finagent", "POSTGRES_USER=finagent", "POSTGRES_PASSWORD=finagent"]
    volumes: ["postgres:/var/lib/postgresql/data"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U finagent"], interval: 5s, timeout: 5s, retries: 10}
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis:/data"]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10}
  prometheus:
    image: prom/prometheus:v3.2.1
    volumes: ["./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
volumes: {postgres: {}, redis: {}, chroma: {}}

