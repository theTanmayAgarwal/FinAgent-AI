services:
  - type: web
    runtime: docker
    name: finagent-ai-api
    plan: free
    region: singapore
    dockerCommand: uvicorn finagent.api.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finagent-ai-db
          property: connectionString
      - key: MARKET_DATA_MODE
        value: live
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: /tmp/finagent-chroma

  - type: web
    runtime: docker
    name: finagent-ai-dashboard
    plan: free
    region: singapore
    dockerCommand: streamlit run finagent/ui/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    autoDeployTrigger: checksPass
    envVars:
      - key: FINAGENT_API_URL
        value: https://finagent-ai-api.onrender.com/api/v1

databases:
  - name: finagent-ai-db
    plan: free
    region: singapore
    databaseName: finagent
    user: finagent
