name: CI
on:
  push:
  pull_request:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e '.[dev]'
      - run: ruff check finagent tests
      - run: pytest --cov=finagent --cov-report=term-missing --cov-fail-under=70
      - run: docker build -t finagent-ai:${{ github.sha }} .

